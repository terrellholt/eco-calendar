function getWeekStart(d) { var dt = new Date(d); dt.setHours(0,0,0,0); dt.setDate(dt.getDate() - dt.getDay()); return dt; }

function impCls(v) {
  v = (v || 'none').toLowerCase();
  if (v === 'high') { return 'high'; }
  if (v === 'medium') { return 'medium'; }
  if (v === 'low') { return 'low'; }
  return 'none';
}
function impLabel(v) {
  v = (v || 'none').toLowerCase();
  if (v === 'high') { return 'High Impact'; }
  if (v === 'medium') { return 'Medium Impact'; }
  if (v === 'low') { return 'Low Impact'; }
  return '';
}
function mkLogo(domain) {
  if (!domain) { return ''; }
  return 'https://img.logo.dev/' + domain + '?token=' + LOGO_KEY + '&size=64';
}

function deriveName(cat, evt) {
  if (!cat) { return ''; }
  if (cat === 'Market Holiday' || cat === 'Early Close') { return 'NYSE / NASDAQ'; }
  if (cat === 'Fed / FOMC') { return 'Federal Reserve'; }
  if (cat === 'Economic Release') {
    var e = evt || '';
    if (e.indexOf('CPI') > -1 || e.indexOf('PPI') > -1 || e.indexOf('Jobs') > -1 || e.indexOf('NFP') > -1) { return 'Bureau of Labor Statistics'; }
    if (e.indexOf('GDP') > -1 || e.indexOf('PCE') > -1) { return 'Bureau of Economic Analysis'; }
    if (e.indexOf('ISM') > -1) { return 'Institute for Supply Management'; }
    if (e.indexOf('Housing') > -1) { return 'U.S. Census Bureau / HUD'; }
  }
  return '';
}

function deriveLogo(cat, evt) {
  if (!cat) { return ''; }
  if (cat === 'Market Holiday' || cat === 'Early Close') { return mkLogo('nyse.com'); }
  if (cat === 'Fed / FOMC') { return mkLogo('federalreserve.gov'); }
  if (cat === 'Economic Release') {
    var e = evt || '';
    if (e.indexOf('CPI') > -1 || e.indexOf('PPI') > -1 || e.indexOf('Jobs') > -1 || e.indexOf('NFP') > -1) { return mkLogo('bls.gov'); }
    if (e.indexOf('GDP') > -1 || e.indexOf('PCE') > -1) { return mkLogo('bea.gov'); }
    if (e.indexOf('ISM') > -1) { return mkLogo('ismworld.org'); }
    if (e.indexOf('Housing') > -1) { return mkLogo('census.gov'); }
  }
  return '';
}

function deriveSource(cat) {
  if (!cat) { return ''; }
  if (cat === 'Market Holiday' || cat === 'Early Close') { return 'https://www.nyse.com'; }
  if (cat === 'Fed / FOMC') { return 'https://www.federalreserve.gov'; }
  if (cat === 'Economic Release') { return 'https://www.bls.gov/schedule'; }
  return '';
}

function deriveTime(notes) {
  if (!notes) { return ''; }
  if (notes.indexOf('8:30 AM') > -1) { return '8:30 AM ET'; }
  if (notes.indexOf('10:00 AM') > -1) { return '10:00 AM ET'; }
  if (notes.indexOf('2:00 PM') > -1) { return '2:00 PM ET'; }
  if (notes.indexOf('1:00 PM') > -1) { return '1:00 PM ET'; }
  return '';
}

function parseDate(dateStr, monthStr) {
  if (!dateStr) { return { start: '', end: '' }; }
  dateStr = String(dateStr).trim();
  if (dateStr.length < 2) { return { start: '', end: '' }; }
  if (dateStr.indexOf('--') > -1) { return { start: '', end: '' }; }
  var m = MMAP[monthStr] || '01';
  var parts = dateStr.split(' ');
  var num = parts[parts.length - 1];
  if (isNaN(parseInt(num.charAt(0)))) { return { start: '', end: '' }; }
  if (num.indexOf('-') > -1) {
    var ns = num.split('-');
    return { start: '2027-' + m + '-' + ns[0].padStart(2,'0'), end: '2027-' + m + '-' + ns[1].padStart(2,'0') };
  }
  return { start: '2027-' + m + '-' + num.padStart(2,'0'), end: '' };
}

function fetchEvents() {
  // Joins the Entities table so entity-level logo/hero/content can serve as fallbacks
  var url = SUPA_URL + '/rest/v1/Master%20Calendar?select=*,entity:entity_id!left(logo_url,hero_url,why_it_matters,impacted_assets,measures,frequency)&order=id.asc&limit=500';
  return fetch(url, {
    headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
  })
  .then(function(r) { return r.json(); })
  .then(function(rows) {
    events = [];
    rows.forEach(function(r) {
      if (!r.date || !r.month) { return; }
var parsed = parseDate(r.date, r.month);
// Also handle ISO timestamp format from Supabase
if (!parsed.start && r.date && r.date.length >= 10) {
  parsed = { start: r.date.substring(0, 10), end: '' };
}
if (!parsed.start) { return; }
      var impact = (r.impact || '').toLowerCase();
      if (impact !== 'high' && impact !== 'medium' && impact !== 'low') { impact = 'none'; }
      var showMini = true;
      if (r.show_in_monthly === false) { showMini = false; }
      var ent = r.entity || {};
      events.push({
        id: r.id,
        title: r.event || '',
        name: deriveName(r.category, r.event),
        date: parsed.start,
        endDate: parsed.end || '',
        time: r.display_time || deriveTime(r.notes || ''),
        impact: impact,
        showMini: showMini,
        // Fallback chain: event-level → entity-level → derived from category
        logo: r.logo_url || ent.logo_url || deriveLogo(r.category, r.event),
        hero: r.hero_url || ent.hero_url || '',
        whyMatters: r.why_it_matters || ent.why_it_matters || '',
        measures: r.measures || ent.measures || '',
        impactedAssets: ent.impacted_assets || '',
        frequency: r.frequency || ent.frequency || '',
        details: r.details || '',
        source: r.source_url || deriveSource(r.category),
        ticker: r.ticker || '',
        aka: r.aka || '',
        category: r.category || ''
      });
    });
  });
}

function buildSidebar() {
  var today = new Date(); today.setHours(0,0,0,0);
  if (allExpanded && Object.keys(openMonths).length === 0) {
    [2026,2027].forEach(function(y) { for (var mi = 0; mi < 12; mi++) { openMonths[y+'-'+mi] = true; } });
  }
  var wEnd = new Date(weekStart); wEnd.setDate(wEnd.getDate() + 6);
  var html = '';
  [2026,2027].forEach(function(y) {
    MONTHS.forEach(function(m, mi) {
      var key = y + '-' + mi;
      var isOpen = !!openMonths[key];
      var isAct = weekStart.getFullYear() === y && weekStart.getMonth() === mi;
      var cls = 'month-label' + (isAct ? ' active-month' : '') + (isOpen ? ' open' : '');
      html += '<div class="' + cls + '" data-key="' + key + '" data-y="' + y + '" data-mi="' + mi + '" onclick="handleMonthClick(this)">';
      html += '<span>' + m + ' <span class="month-year-tag">' + y + '</span></span><span class="chevron">&#8250;</span></div>';
      html += '<div class="month-grid-wrap' + (isOpen ? ' visible' : '') + '" id="mg-' + key + '">' + buildMonthGrid(y, mi, today, weekStart, wEnd) + '</div>';
    });
  });
  document.getElementById('monthNav').innerHTML = html;
  var btn = document.getElementById('expandAllBtn');
  if (btn) {
    if (allExpanded) {
      btn.innerHTML = '<svg viewBox="0 0 24 24" style="width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/></svg> Collapse All';
    } else {
      btn.innerHTML = '<svg viewBox="0 0 24 24" style="width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg> Expand All';
    }
  }
}

function buildMonthGrid(y, mi, today, wStart, wEnd) {
  var firstDay = new Date(y, mi, 1);
  var lastDay = new Date(y, mi+1, 0);
  var startDow = firstDay.getDay();
  var html = '<div class="mgrid-head">';
  DAYS_SH.forEach(function(d) { html += '<span>' + d + '</span>'; });
  html += '</div><div class="mgrid-body">';
  for (var i = 0; i < startDow; i++) { html += '<div class="mgrid-cell other-month"></div>'; }
  for (var d = 1; d <= lastDay.getDate(); d++) {
    var date = new Date(y, mi, d);
    var dateStr = ds(date);
    var isTod = date.getTime() === today.getTime();
    var inWk = date >= wStart && date <= wEnd;
    var cls = 'mgrid-cell';
    if (isTod) { cls += ' today-cell'; } else if (inWk) { cls += ' in-current-week'; }
    var dayEvts = events.filter(function(e) { return e.date === dateStr && e.showMini; }).slice(0, 3);
    var evtHtml = dayEvts.map(function(ev) { return '<div class="mgrid-evt ' + impCls(ev.impact) + '">' + ev.title + '</div>'; }).join('');
    html += '<div class="' + cls + '" data-date="' + dateStr + '" onclick="handleDateClick(this)"><div class="mgrid-date">' + d + '</div><div class="mgrid-events">' + evtHtml + '</div></div>';
  }
  var rem = (startDow + lastDay.getDate()) % 7;
  if (rem > 0) { for (var i = 0; i < 7 - rem; i++) { html += '<div class="mgrid-cell other-month"></div>'; } }
  return html + '</div>';
}

function handleMonthClick(el) {
  toggleMonth(el.getAttribute('data-key'), parseInt(el.getAttribute('data-y')), parseInt(el.getAttribute('data-mi')));
}
function handleDateClick(el) { jumpToDate(el.getAttribute('data-date')); }
function handleCardClick(el) { openModal(parseInt(el.getAttribute('data-id'))); }

function toggleMonth(key, y, mi) {
  if (openMonths[key]) { delete openMonths[key]; } else { openMonths[key] = true; }
  allExpanded = Object.keys(openMonths).length >= 24;
  weekStart = getWeekStart(new Date(y, mi, 1));
  buildSidebar();
  renderWeek();
}
function jumpToDate(dateStr) {
  weekStart = getWeekStart(new Date(dateStr + 'T12:00:00'));
  buildSidebar();
  renderWeek();
}
function toggleAllMonths() {
  allExpanded = !allExpanded;
  if (allExpanded) {
    [2026,2027].forEach(function(y) { for (var mi = 0; mi < 12; mi++) { openMonths[y+'-'+mi] = true; } });
  } else {
    openMonths = {};
    var t = new Date();
    openMonths[t.getFullYear() + '-' + t.getMonth()] = true;
  }
  buildSidebar();
}
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  var sb = document.getElementById('sidebar');
  var ico = document.getElementById('arrowIcon');
  if (sidebarOpen) {
    sb.classList.remove('collapsed');
    ico.setAttribute('points','15 18 9 12 15 6');
  } else {
    sb.classList.add('collapsed');
    ico.setAttribute('points','9 18 15 12 9 6');
  }
  setTimeout(positionArrow, 220);
  positionArrow();
}
function positionArrow() {
  var rail = document.querySelector('.icon-rail');
  var sb = document.getElementById('sidebar');
  var arrow = document.getElementById('sidebarArrow');
  var wn = document.querySelector('.week-nav');
  if (!arrow) { return; }
  var railW = rail ? rail.offsetWidth : 52;
  var sbW = (sidebarOpen && sb) ? sb.offsetWidth : 0;
  arrow.style.left = (railW + sbW - 1) + 'px';
  if (wn) {
    var wr = wn.getBoundingClientRect();
    var ar = document.querySelector('.app').getBoundingClientRect();
    arrow.style.top = (wr.top - ar.top + 10) + 'px';
  }
}

function renderWeek() {
  var today = new Date(); today.setHours(0,0,0,0);
  var days = [];
  for (var i = 0; i < 7; i++) {
    var d = new Date(weekStart);
    d.setDate(d.getDate() + i);
    days.push(d);
  }
  var byDate = {};
  days.forEach(function(d) { byDate[ds(d)] = []; });
  events.forEach(function(ev) { if (byDate[ev.date] !== undefined) { byDate[ev.date].push(ev); } });
  var fmt = function(d) { return d.toLocaleDateString('en-US', {month:'short', day:'numeric'}); };
  document.getElementById('weekSub').textContent = fmt(days[0]) + ' to ' + fmt(days[6]) + ' - Click any event to view details.';
  document.getElementById('weekGrid').innerHTML = days.map(function(d, i) {
    var isToday = d.getTime() === today.getTime();
    var evs = byDate[ds(d)] || [];
    var cards = evs.map(function(ev) { return cardHtml(ev); }).join('');
    var hdrCls = 'day-header' + (isToday ? ' today' : '');
    return '<div class="day-col"><div class="' + hdrCls + '"><div class="day-name">' + DAYS[i] + '</div><div class="day-num">' + d.getDate() + '</div><div class="day-month">' + MONTHS_SH[d.getMonth()] + '</div></div><div class="day-events">' + cards + '</div></div>';
  }).join('');
}

function cardHtml(ev) {
  var cls = impCls(ev.impact);
  var label = impLabel(ev.impact);
  var logoHtml = '';
  if (ev.logo) { logoHtml = '<img class="card-logo" src="' + ev.logo + '" alt="" onerror="this.style.display=\'none\'">'; }
  var timeHtml = '';
  if (ev.time) { timeHtml = '<div class="card-time">' + ev.time + '</div>'; }
  var labelHtml = '';
  if (label) { labelHtml = '<div class="card-impact ' + cls + '">' + label + '</div>'; }
  return '<div class="ecard ' + cls + '" data-id="' + ev.id + '" onclick="handleCardClick(this)">' + timeHtml + logoHtml + '<div class="card-title">' + ev.title + '</div>' + labelHtml + '</div>';
}

function openModal(id) {
  var ev = null;
  for (var i = 0; i < events.length; i++) { if (events[i].id === id) { ev = events[i]; break; } }
  if (!ev) { return; }
  var heroImg = document.getElementById('modalHeroImg');
  if (ev.hero) { heroImg.src = ev.hero; heroImg.style.display = 'block'; } else { heroImg.style.display = 'none'; }
  var logoEl = document.getElementById('modalLogo');
  if (ev.logo) { logoEl.src = ev.logo; logoEl.style.display = 'block'; } else { logoEl.style.display = 'none'; }
  document.getElementById('modalTitle').textContent = ev.title;
  document.getElementById('modalName').textContent = ev.name || ev.category || '';
  var meta = '';
  if (ev.impact && ev.impact !== 'none') { meta += '<span class="modal-tag ' + ev.impact + '">' + impLabel(ev.impact) + '</span>'; }
  if (ev.time) { meta += '<span class="modal-tag">' + ev.time + '</span>'; }
  if (ev.frequency) { meta += '<span class="modal-tag">' + ev.frequency.charAt(0).toUpperCase() + ev.frequency.slice(1) + '</span>'; }
  if (ev.ticker) { meta += '<span class="modal-tag">' + ev.ticker + '</span>'; }
  if (ev.aka && ev.aka !== ev.category) { meta += '<span class="modal-tag">' + ev.aka + '</span>'; }
  if (ev.impactedAssets) { meta += '<span class="modal-tag">' + ev.impactedAssets + '</span>'; }
  document.getElementById('modalMeta').innerHTML = meta;
  var hasContent = ev.whyMatters || ev.measures || ev.details;
  document.getElementById('modalDiv1').style.display = hasContent ? 'block' : 'none';
  var ws = document.getElementById('modalWhySection');
  if (ev.whyMatters) { ws.style.display = 'block'; document.getElementById('modalWhy').textContent = ev.whyMatters; } else { ws.style.display = 'none'; }
  var ms = document.getElementById('modalMeasuresSection');
  if (ev.measures) { ms.style.display = 'block'; document.getElementById('modalMeasures').textContent = ev.measures; } else { ms.style.display = 'none'; }
  var det = document.getElementById('modalDetailsSection');
  if (ev.details) { det.style.display = 'block'; document.getElementById('modalDetails').innerHTML = ev.details; } else { det.style.display = 'none'; }
  var srcEl = document.getElementById('modalSource');
  var div2 = document.getElementById('modalDiv2');
  if (ev.source) { srcEl.href = ev.source; srcEl.style.display = 'inline'; div2.style.display = 'block'; } else { srcEl.style.display = 'none'; div2.style.display = 'none'; }
  document.getElementById('overlay').classList.add('open');
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function overlayClick(e) { if (e.target === document.getElementById('overlay')) { closeModal(); } }

function prevWeek() { weekStart.setDate(weekStart.getDate() - 7); buildSidebar(); renderWeek(); }
function nextWeek() { weekStart.setDate(weekStart.getDate() + 7); buildSidebar(); renderWeek(); }
function goToday() { weekStart = getWeekStart(new Date()); buildSidebar(); renderWeek(); }

function updateClocks() {
  var opt = {hour:'2-digit', minute:'2-digit', hour12:true};
  var zones = {'time-ny':'America/New_York','time-lon':'Europe/London','time-fra':'Europe/Berlin','time-riy':'Asia/Riyadh','time-sha':'Asia/Shanghai','time-tok':'Asia/Tokyo','time-syd':'Australia/Sydney'};
  Object.keys(zones).forEach(function(id) {
    var el = document.getElementById(id);
    if (el) { el.textContent = new Date().toLocaleTimeString('en-US', Object.assign({}, opt, {timeZone: zones[id]})); }
  });
}
setInterval(updateClocks, 1000);
updateClocks();

fetchEvents().then(function() {
  buildSidebar();
  renderWeek();
  setTimeout(positionArrow, 50);
}).catch(function(err) {
  console.error('Supabase fetch failed:', err);
  document.getElementById('weekGrid').innerHTML = '<div class="load-error">Could not load events. Please refresh.</div>';
});
</script>
