<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eco Calendar — 2027</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;height:100vh;overflow:hidden;display:flex;flex-direction:column}
  .topbar{height:48px;background:#111;display:flex;align-items:center;padding:0 16px;gap:16px;flex-shrink:0}
  .topbar-logo{color:#fff;font-weight:700;font-size:15px;letter-spacing:-.02em;white-space:nowrap}
  .tv-bar{flex:1;overflow:hidden;height:48px;display:flex;align-items:center}
  .app{display:flex;flex:1;overflow:hidden}
  .sidebar{width:220px;background:#fff;border-right:1px solid #e5e5e0;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
  .sidebar-header{padding:14px 16px 8px;border-bottom:1px solid #f0f0ec}
  .sidebar-title{font-size:14px;font-weight:600}
  .sidebar-sub{font-size:11px;color:#999;margin-top:2px}
  .sidebar-nav{display:flex;flex-direction:column;gap:1px;padding:6px}
  .nav-year{font-size:11px;font-weight:600;color:#aaa;padding:8px 8px 2px;letter-spacing:.06em;text-transform:uppercase}
  .nav-month{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:13px;color:#555;transition:background .12s}
  .nav-month:hover{background:#f5f5f0}
  .nav-month.active{background:#1a1a1a;color:#fff}
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
  .week-nav{padding:12px 20px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e5e5e0;background:#fff;flex-shrink:0}
  .week-title{font-size:16px;font-weight:600}
  .week-sub{font-size:11px;color:#999;margin-top:2px}
  .week-controls{display:flex;gap:6px;align-items:center}
  .btn{font-size:12px;padding:5px 12px;border-radius:6px;border:1px solid #e0e0db;background:#fff;cursor:pointer;color:#333;transition:all .12s}
  .btn:hover{background:#f5f5f0}
  .week-grid{flex:1;display:grid;grid-template-columns:repeat(7,1fr);overflow-y:auto}
  .day-col{border-right:1px solid #e5e5e0;display:flex;flex-direction:column}
  .day-col:last-child{border-right:none}
  .day-header{padding:8px 10px 6px;border-bottom:1px solid #f0f0ec;flex-shrink:0;background:#fff;position:sticky;top:0;z-index:2}
  .day-name{font-size:10px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.04em}
  .day-num{font-size:18px;font-weight:300;color:#1a1a1a;line-height:1.1;margin-top:1px}
  .day-header.today .day-name{color:#2563eb}
  .day-header.today .day-num{background:#2563eb;color:#fff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500}
  .day-date-label{font-size:10px;color:#ccc;margin-top:1px}
  .day-events{padding:5px;display:flex;flex-direction:column;gap:4px;flex:1}
  .add-evt{font-size:11px;color:#ccc;cursor:pointer;padding:3px 5px;border-radius:4px;transition:all .12s}
  .add-evt:hover{color:#888;background:#f5f5f0}
  .ecard{border-radius:7px;padding:7px 8px;cursor:pointer;transition:all .15s;border:1px solid transparent}
  .ecard:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.08)}
  .ecard.high{background:#FFF0EE;border-color:#FCCBC7}
  .ecard.medium{background:#FFF8EE;border-color:#FFE0A3}
  .ecard.low{background:#F0FFF4;border-color:#B8EEC8}
  .ecard.corporate{background:#F0F4FF;border-color:#C7D4FC}
  .ecard.holiday{background:#FFF0EE;border-color:#FCCBC7}
  .card-time{font-size:10px;color:#999;font-weight:500;margin-bottom:2px}
  .card-logo{width:20px;height:20px;border-radius:3px;object-fit:contain;margin-bottom:3px;background:#fff;padding:1px}
  .card-title{font-size:11px;font-weight:600;color:#1a1a1a;line-height:1.3}
  .card-impact{font-size:10px;font-weight:500;margin-top:2px}
  .card-impact.high,.card-impact.holiday{color:#e24b4a}
  .card-impact.medium{color:#d97706}
  .card-impact.low{color:#16a34a}
  .card-impact.corporate{color:#2563eb}
  .no-evt{font-size:11px;color:#ddd;padding:6px 4px;font-style:italic}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
  .modal-overlay.open{opacity:1;pointer-events:all}
  .modal{background:#fff;border-radius:14px;width:100%;max-width:600px;max-height:88vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.2);transform:translateY(10px);transition:transform .2s;position:relative}
  .modal-overlay.open .modal{transform:translateY(0)}
  .modal-hero{width:100%;height:150px;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);border-radius:14px 14px 0 0;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .modal-hero-text{color:rgba(255,255,255,.12);font-size:56px;font-weight:800;letter-spacing:-.02em}
  .hero-cat{position:absolute;top:12px;left:14px;background:rgba(255,255,255,.15);color:#fff;font-size:11px;padding:3px 10px;border-radius:20px;backdrop-filter:blur(4px);font-weight:500}
  .modal-close{position:absolute;top:12px;right:12px;width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,.4);border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;line-height:1}
  .modal-body{padding:18px 22px 24px}
  .modal-top{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px}
  .modal-logo{width:48px;height:48px;border-radius:9px;object-fit:contain;background:#f5f5f0;padding:4px;border:1px solid #e5e5e0;flex-shrink:0}
  .modal-logo-ph{width:48px;height:48px;border-radius:9px;background:#f0f0ec;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#888;border:1px solid #e5e5e0;flex-shrink:0}
  .modal-title{font-size:17px;font-weight:700;color:#1a1a1a;line-height:1.2}
  .modal-entity{font-size:12px;color:#777;margin-top:3px}
  .modal-ticker{display:inline-block;font-size:11px;font-weight:600;color:#2563eb;background:#eff6ff;padding:2px 7px;border-radius:4px;margin-top:4px}
  .impact-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:6px;white-space:nowrap}
  .impact-pill.high,.impact-pill.holiday{background:#FFF0EE;color:#e24b4a}
  .impact-pill.medium{background:#FFF8EE;color:#d97706}
  .impact-pill.low{background:#F0FFF4;color:#16a34a}
  .impact-pill.corporate{background:#F0F4FF;color:#2563eb}
  .idot{width:6px;height:6px;border-radius:50%;background:currentColor}
  .mlabel{font-size:10px;font-weight:600;color:#bbb;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
  .mval{font-size:13px;color:#333;line-height:1.5}
  .mrow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
  .msec{margin-bottom:14px}
  .divider{height:1px;background:#f0f0ec;margin:14px 0}
  .chart-wrap{border-radius:8px;overflow:hidden;border:1px solid #e5e5e0;height:200px;margin-top:6px}
  .assets{display:flex;gap:5px;flex-wrap:wrap}
  .atag{font-size:11px;font-weight:600;background:#f0f4ff;color:#2563eb;padding:2px 8px;border-radius:4px;border:1px solid #c7d4fc}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid #f0f0ec}
  .btn-done{background:#1a1a1a;color:#fff;border:none;font-size:13px;padding:8px 20px;border-radius:8px;cursor:pointer;font-weight:500}
  .spinner{width:20px;height:20px;border:2px solid #e5e5e0;border-top-color:#666;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-col{grid-column:1/-1;display:flex;align-items:center;justify-content:center;height:200px;flex-direction:column;gap:10px;color:#bbb;font-size:13px}
  .demo-bar{background:#fffbeb;border-bottom:1px solid #fde68a;padding:6px 20px;font-size:11px;color:#92400e;flex-shrink:0;display:none}
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-logo">📅 Eco Calendar</span>
  <div class="tv-bar">
    <script type="module" src="https://widgets.tradingview-widget.com/w/en/tv-ticker-tape.js"></script>
    <tv-ticker-tape style="width:100%;height:44px" symbols="FOREXCOM:SPXUSD,OANDA:USB10YUSD,INDEX:DXY,BITSTAMP:BTCUSD,OANDA:XAUUSD" theme="dark"></tv-ticker-tape>
  </div>
</div>

<div class="demo-bar" id="demoBanner">⚠ Showing sample data. In Supabase: Settings → Data API → expose all tables, then disable RLS on each table.</div>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Time Navigation</div>
      <div class="sidebar-sub">2026 – 2027</div>
    </div>
    <div class="sidebar-nav" id="monthNav"></div>
  </div>
  <div class="main">
    <div class="week-nav">
      <div>
        <div class="week-title">What to Watch for the Week</div>
        <div class="week-sub" id="weekSub">Key events and catalysts. Click any event to view details.</div>
      </div>
      <div class="week-controls">
        <button class="btn" onclick="prevWeek()">← Prev</button>
        <button class="btn" onclick="goToday()">Today</button>
        <button class="btn" onclick="nextWeek()">Next →</button>
      </div>
    </div>
    <div class="week-grid" id="weekGrid">
      <div class="loading-col"><div class="spinner"></div><span>Loading your calendar…</span></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-hero" id="mHero"></div>
    <button class="modal-close" onclick="closeDirect()">×</button>
    <div class="modal-body" id="mBody"></div>
  </div>
</div>

<script>
const SB = "https://pkzjgjtzljjjohiybnud.supabase.co";
const KEY = "sb_publishable_1d2xEdTwRRtxFoflyw2p5g_c1hq5WVe";
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

let allEvents = [], entityMap = {}, weekStart = getWeekStart(new Date()), usingMock = false;

function buildMock() {
  const base = getWeekStart(new Date());
  const items = [
    {id:1,event:"Fed Chair Powell Speaks",category:"Fed / FOMC",impact:"High",time:"8:30 AM",notes:"Congressional testimony on monetary policy outlook.",ticker:"SPY",day:0},
    {id:2,event:"US Building Permits",category:"Economic Release",impact:"High",time:"10:00 AM",notes:"Census Bureau monthly housing construction data.",ticker:null,day:1},
    {id:3,event:"CPI (YoY)",category:"Economic Release",impact:"High",time:"8:30 AM",notes:"Bureau of Labor Statistics. Key inflation gauge watched closely by the Fed.",ticker:null,day:2},
    {id:4,event:"FOMC Meeting Minutes",category:"Fed / FOMC",impact:"High",time:"8:30 AM",notes:"Released 3 weeks after the FOMC meeting. Markets parse for policy clues.",ticker:null,day:3},
    {id:5,event:"Initial Jobless Claims",category:"Economic Release",impact:"High",time:"8:30 AM",notes:"Dept. of Labor weekly unemployment filings.",ticker:null,day:4},
    {id:6,event:"PCE Price Index",category:"Economic Release",impact:"High",time:"8:30 AM",notes:"The Fed's preferred inflation measure.",ticker:null,day:5},
    {id:7,event:"Apple WWDC",category:"Corporate",impact:"Medium",time:"10:00 AM",notes:"Apple's annual developer conference. Major product and software announcements expected.",ticker:"AAPL",logo:"https://img.logo.dev/apple.com?token=pk_J5OFKwFoQIiLqMnXkm6lMA&size=64",day:1},
    {id:8,event:"Retail Sales (MoM)",category:"Economic Release",impact:"Medium",time:"9:00 AM",notes:"Census Bureau consumer spending indicator.",ticker:null,day:1},
    {id:9,event:"Home Depot Earnings",category:"Corporate",impact:"Medium",time:"8:30 AM",notes:"Q4 FY2026 earnings. Focus on housing market health and consumer spending.",ticker:"HD",day:2},
    {id:10,event:"NVIDIA Earnings",category:"Corporate",impact:"High",time:"4:00 PM",notes:"Q4 FY2027 earnings. Key signal for AI infrastructure demand.",ticker:"NVDA",day:3},
    {id:11,event:"Meta Platforms Earnings",category:"Corporate",impact:"Medium",time:"7:00 PM",notes:"Q4 2026 earnings. Ad revenue growth and AI investment in focus.",ticker:"META",day:3},
    {id:12,event:"Existing Home Sales",category:"Economic Release",impact:"Medium",time:"10:00 AM",notes:"NAR monthly resale data.",ticker:null,day:4},
    {id:13,event:"Durable Goods Orders",category:"Economic Release",impact:"Low",time:"10:00 AM",notes:"Census Bureau manufacturing health indicator.",ticker:null,day:5},
    {id:14,event:"Berkshire Hathaway Shareholder Mtg.",category:"Corporate",impact:"Low",time:"TBD",notes:"Annual shareholder meeting. Warren Buffett Q&A.",ticker:"BRK.B",day:5},
  ];
  return items.map(d => {
    const dt = new Date(base);
    dt.setDate(dt.getDate() + d.day);
    return {...d, date: dt.toISOString().split("T")[0]};
  });
}

async function sbGet(table) {
  const r = await fetch(`${SB}/rest/v1/${encodeURIComponent(table)}?select=*&limit=1000`, {
    headers:{apikey:KEY,Authorization:`Bearer ${KEY}`}
  });
  if(!r.ok) throw new Error(r.status);
  return r.json();
}

async function loadData() {
  try {
    const [evts, ents] = await Promise.all([sbGet("Master Calendar"), sbGet("entity_library")]);
    if(!Array.isArray(evts) || evts.length === 0) throw new Error("empty");
    allEvents = evts;
    (ents||[]).forEach(e => { if(e.id) entityMap[e.id] = e; });
    usingMock = false;
  } catch(e) {
    allEvents = buildMock();
    usingMock = true;
    document.getElementById("demoBanner").style.display = "block";
  }
  buildSidebar();
  renderWeek();
}

function getWeekStart(d) {
  const dt = new Date(d); dt.setHours(0,0,0,0);
  dt.setDate(dt.getDate() - dt.getDay());
  return dt;
}
function ds(d) { return d.toISOString().split("T")[0]; }
function impCls(impact, category) {
  const c = (category||"").toLowerCase();
  if(c.includes("holiday")) return "holiday";
  if(c.includes("corp")||c.includes("earn")) return "corporate";
  const v = (impact||"").toLowerCase();
  if(v==="high") return "high";
  if(v==="medium"||v==="med") return "medium";
  return "low";
}
function impLabel(impact, category) {
  const c = (category||"").toLowerCase();
  if(c.includes("holiday")) return "Market Holiday";
  if(c.includes("corp")||c.includes("earn")) return "Corporate";
  const v = (impact||"low");
  return v.charAt(0).toUpperCase()+v.slice(1).toLowerCase()+" Impact";
}

function buildSidebar() {
  const nav = document.getElementById("monthNav");
  nav.innerHTML = [2026,2027].map(y => `
    <div class="nav-year">${y}</div>
    ${MONTHS.map((m,mi) => {
      const isActive = weekStart.getFullYear()===y && weekStart.getMonth()===mi;
      return `<div class="nav-month${isActive?" active":""}" onclick="jumpTo(${y},${mi})">${m} <span style="opacity:.3">›</span></div>`;
    }).join("")}
  `).join("");
}

function jumpTo(y,m) { weekStart = getWeekStart(new Date(y,m,1)); buildSidebar(); renderWeek(); }

function renderWeek() {
  const today = new Date(); today.setHours(0,0,0,0);
  const days = Array.from({length:7},(_,i)=>{ const d=new Date(weekStart); d.setDate(d.getDate()+i); return d; });
  const byDate = {};
  days.forEach(d => byDate[ds(d)] = []);
  allEvents.forEach(ev => {
    const evd = (ev.date||ev.Date||"").split("T")[0];
    if(byDate[evd] !== undefined) byDate[evd].push(ev);
  });
  const fmt = d => d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
  document.getElementById("weekSub").textContent = `${fmt(days[0])} – ${fmt(days[6])}  ·  Click any event to view details.`;
  document.getElementById("weekGrid").innerHTML = days.map((d,i) => {
    const isToday = d.getTime()===today.getTime();
    const evs = byDate[ds(d)]||[];
    const numStr = isToday
      ? `<div class="day-num" style="background:#2563eb;color:#fff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500">${d.getDate()}</div>`
      : `<div class="day-num">${d.getDate()}</div>`;
    return `<div class="day-col">
      <div class="day-header${isToday?" today":""}">
        <div class="day-name">${DAYS[i]}</div>
        ${numStr}
        <div class="day-date-label">${d.toLocaleDateString("en-US",{month:"short",day:"numeric"})}</div>
      </div>
      <div class="day-events">
        ${evs.length===0?'<div class="no-evt">No events</div>':evs.map(ev=>cardHtml(ev)).join("")}
        <div class="add-evt">+ Add Event</div>
      </div>
    </div>`;
  }).join("");
  buildSidebar();
}

function cardHtml(ev) {
  const cls = impCls(ev.impact||ev.Impact, ev.category||ev.Category);
  const label = impLabel(ev.impact||ev.Impact, ev.category||ev.Category);
  const logo = ev.logo || (ev.entity_id && entityMap[ev.entity_id]?.logo_art_jpg) || null;
  const title = ev.event||ev.Event||ev.title||"";
  const time = ev.time||ev.Time||"";
  const safe = encodeURIComponent(JSON.stringify(ev));
  return `<div class="ecard ${cls}" onclick="openModal('${safe}')">
    ${time?`<div class="card-time">${time}</div>`:""}
    ${logo?`<img class="card-logo" src="${logo}" alt="" onerror="this.style.display='none'">` :""}
    <div class="card-title">${title}</div>
    <div class="card-impact ${cls}">${label}</div>
  </div>`;
}

function prevWeek(){ weekStart.setDate(weekStart.getDate()-7); renderWeek(); }
function nextWeek(){ weekStart.setDate(weekStart.getDate()+7); renderWeek(); }
function goToday(){ weekStart=getWeekStart(new Date()); renderWeek(); }

function openModal(safe) {
  const ev = JSON.parse(decodeURIComponent(safe));
  const cls = impCls(ev.impact||ev.Impact, ev.category||ev.Category);
  const label = impLabel(ev.impact||ev.Impact, ev.category||ev.Category);
  const logo = ev.logo || (ev.entity_id && entityMap[ev.entity_id]?.logo_art_jpg) || null;
  const entity = ev.entity_id ? entityMap[ev.entity_id] : null;
  const ticker = ev.ticker || entity?.ticker_symbol || null;
  const entityName = ev.entity_name || entity?.entity_name || null;
  const title = ev.event||ev.Event||ev.title||"Event";
  const notes = ev.notes||ev.Notes||ev.description||ev.why_it_matters||"";
  const time = ev.time||ev.Time||"";
  const date = ev.date||ev.Date||"";
  const category = ev.category||ev.Category||"";
  const assets = ticker?[ticker]:[];

  document.getElementById("mHero").innerHTML = `
    <div class="modal-hero-text">${title.substring(0,3).toUpperCase()}</div>
    <span class="hero-cat">${category||"Event"}</span>`;

  const dateStr2 = date ? new Date(date+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"}) : "";

  const chartHtml = ticker ? `
    <div class="msec">
      <div class="mlabel">Price Chart — ${ticker}</div>
      <div class="chart-wrap">
        <div class="tradingview-widget-container" style="height:200px;width:100%">
          <div class="tradingview-widget-container__widget" style="height:200px"></div>
          <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js" async>
          {"symbol":"${ticker}","width":"100%","height":200,"locale":"en","dateRange":"3M","colorTheme":"light","isTransparent":true,"autosize":false}
          <\/script>
        </div>
      </div>
    </div>` : "";

  document.getElementById("mBody").innerHTML = `
    <div class="modal-top">
      <div>
        ${logo
          ? `<img class="modal-logo" src="${logo}" alt="" onerror="this.outerHTML='<div class=modal-logo-ph>${title.charAt(0).toUpperCase()}</div>'">`
          : `<div class="modal-logo-ph">${title.charAt(0).toUpperCase()}</div>`}
      </div>
      <div style="flex:1">
        <div class="modal-title">${title}</div>
        ${entityName?`<div class="modal-entity">${entityName}</div>`:""}
        ${ticker?`<span class="modal-ticker">${ticker}</span>`:""}
      </div>
      <span class="impact-pill ${cls}"><span class="idot"></span>${label}</span>
    </div>
    <div class="mrow">
      ${time?`<div><div class="mlabel">Time</div><div class="mval">${time}</div></div>`:""}
      ${dateStr2?`<div><div class="mlabel">Date</div><div class="mval">${dateStr2}</div></div>`:""}
    </div>
    ${notes?`<div class="msec"><div class="mlabel">Why It Matters</div><div class="mval">${notes}</div></div>`:""}
    ${assets.length?`<div class="msec"><div class="mlabel">Impacted Assets</div><div class="assets">${assets.map(a=>`<span class="atag">${a}</span>`).join("")}</div></div>`:""}
    ${chartHtml}
    <div class="modal-actions">
      <button class="btn-done" onclick="closeDirect()">Done</button>
    </div>`;

  document.getElementById("overlay").classList.add("open");
}

function closeModal(e){ if(e.target===document.getElementById("overlay")) closeDirect(); }
function closeDirect(){ document.getElementById("overlay").classList.remove("open"); }

loadData();
</script>
</body>
</html>
